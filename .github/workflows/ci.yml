name: CI & Release

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        shell: pwsh
        run: composer install --no-interaction --prefer-dist

      - name: Run Tests
        shell: pwsh
        run: composer test

  release:
    name: Publish Release
    needs: test
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: WebFiori/workflows/.github/workflows/release-php.yaml@v1.1
    with:
      branch: 'main'
